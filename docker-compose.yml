services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_BACKEND_URL=
    networks:
      - app-network
    restart: unless-stopped

  admin_frontend:
    build:
      context: ./AdminPanel
      args:
        - VITE_BACKEND_URL=
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build: ./backend
    # .env is NOT baked into the image; we load it here via env_file
    env_file:
      - ./backend/.env
    environment:
      # Override ENV from .env file so production settings apply in Docker
      - ENV=production
    # Port 8081 is NOT exposed to host; all traffic flows through nginx
    # Uncomment for local debugging only:
    # ports:
    #   - "8081:8081"
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - admin_frontend
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge